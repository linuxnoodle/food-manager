spring.application.name=foodmanager

# session cookie flags. false for local http dev, flip to true in prod behind https
app.cookie.secure=false

# --- h2 file persistence ---
# file-based db instead of in-memory, survives restarts. path is relative to the
# working dir (run from backend/ so the file lands in backend/data/foodmanager.*).
spring.datasource.url=jdbc:h2:file:./data/foodmanager;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# additive schema sync at startup. fine for dev, swap to "validate" + flyway later
# if you need real migrations. note: it only ADDS columns/tables, never drops them.
spring.jpa.hibernate.ddl-auto=update

# h2 web console at /h2-console, dev only. permitted in SecurityConfig + frame
# options relaxed to same-origin so the console's iframe UI actually renders.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
